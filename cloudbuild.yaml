steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dashboard
      - --source
      - ./frontend-next
      - --region
      - me-west1
      - --project
      - argon-ace-483810-n9
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
